name: Feature request
about: Suggest an idea for this project
title: ""
labels: ["enhancement", "triage"]
assignees: ""
type: feature
body:
  - type: markdown
    attributes:
      value: |
        First check out our main documentation site at [https://openc3.com](https://openc3.com).
  - type: input
    attributes:
      label: What is the use case or problem this feature would solve?
      description: Explain why you think this feature should be added to COSMOS. This could be a problem you have with the way things work now, a use case that isn't currently covered, etc. (Ex. I'm always frustrated when ...)
    validations:
      required: true
  - type: textarea
    attributes:
      label: Describe the solution you'd like
      description: A clear and concise description of what you want to happen. Describing how the feature would work in the context of the OpenC3 Demo configuration is helpful.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Additional context
      description: Add any other context about the feature request here.
  - type: upload
    attributes:
      label: Screenshots
      description: Add any screenshots relevant to the feature request here.
