name: Build COSMOS
description: |
  Build all COSMOS Docker images via `docker compose build`, with type=gha
  layer cache for the slow ruby/base/node base images.

  We use the docker-container buildx driver so that type=gha cache works.
  That driver isolates BuildKit from the host docker daemon's image store,
  which by itself would break `FROM ...openc3-base:latest` lookups in leaf
  images — they'd pull the published openc3-base from Docker Hub instead of
  the just-built local one and fail bundle install for openc3-7.0.2.pre.beta0.

  Workaround: stand up a local registry on the runner and configure BuildKit
  to use it as a pull-through mirror for docker.io. Each base image we build
  is tagged + pushed to localhost:5000, so the mirror has the just-built
  copy. Subsequent FROM lookups in BuildKit hit the mirror and resolve to
  our local image instead of the upstream registry.

runs:
  using: composite
  steps:
    - name: Start local registry (mirror for docker.io)
      shell: bash
      run: |
        docker run -d --rm \
          --network=host \
          --name local-registry \
          registry:2

    - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.4.0
      with:
        driver-opts: |
          network=host
        buildkitd-config-inline: |
          [registry."docker.io"]
            mirrors = ["localhost:5000"]
          [registry."localhost:5000"]
            http = true
            insecure = true

    # Expose ACTIONS_CACHE_URL / ACTIONS_RUNTIME_TOKEN to subsequent steps so
    # that `docker buildx bake` can authenticate to the GHA cache backend.
    # setup-buildx-action only injects these for docker/build-push-action; for
    # manually invoked buildx commands they have to be exported explicitly.
    # See https://docs.docker.com/build/cache/backends/gha/
    - uses: crazy-max/ghaction-github-runtime@3cb05d89e1f492524af3d41a1c98c83bc3025124 # v3.0.0

    - name: Setup (download cacert.pem)
      shell: bash
      run: ./scripts/linux/openc3_setup.sh

    - name: Build base images and push to local registry
      # Build openc3-ruby/base/node sequentially via `docker buildx bake`,
      # which (unlike `docker compose build`) actually forwards the
      # cache_from/cache_to directives from compose-build.yaml to BuildKit.
      # After each, tag and push to localhost:5000 so the BuildKit mirror
      # finds our just-built image when subsequent FROM lookups go through
      # docker.io.
      shell: 'script -q -e -c "bash {0}"'
      run: |
        set -e
        umask 0022
        chmod -R +r .
        for img in openc3-ruby openc3-base openc3-node; do
          docker buildx bake \
            --allow=network.host \
            -f compose.yaml -f compose-build.yaml \
            --load \
            "$img"
          docker tag \
            "docker.io/openc3inc/$img:${OPENC3_TAG:-latest}" \
            "localhost:5000/openc3inc/$img:${OPENC3_TAG:-latest}"
          docker push "localhost:5000/openc3inc/$img:${OPENC3_TAG:-latest}"
        done

    - name: Build remaining images
      shell: 'script -q -e -c "bash {0}"'
      run: |
        docker buildx bake \
          --allow=network.host \
          -f compose.yaml -f compose-build.yaml \
          --load
