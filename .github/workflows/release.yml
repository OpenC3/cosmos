name: COSMOS Core Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version string"
        required: true
        type: string
      next_version:
        description: "Next version string"
        required: true
        type: string
      update_latest:
        description: "Update latest tag"
        required: true
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  release:
    if: ${{ github.actor != 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Required for OIDC
      contents: read
      packages: write # Required for pushing to ghcr.io
    environment: Release # See https://github.com/OpenC3/cosmos/settings/environments
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.QA_PAT }}
      - name: Set up Ruby 3.4
        uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f # v1.310.0
        with:
          ruby-version: 3.4
          bundler-cache: false # runs 'bundle install' and caches installed gems automatically
          working-directory: openc3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Install dependencies
        working-directory: openc3/python
        run: |
          python -m pip install --upgrade pip
          pip install build
      - name: login to ironbank
        # This `shell` line is required to get around a known issue: https://github.com/actions/runner/issues/241#issuecomment-745902718
        shell: 'script -q -e -c "bash {0}"'
        env:
          # Create ENV variable for the IronBank registry CLI token, which is stored as a secret in GitHub
          # This is done to avoid expanding secrets directly in a run block
          # where they may be exposed in process lists, shell history, or files.
          IRONBANK_REGISTRY_CLI: ${{ secrets.IRONBANK_REGISTRY_CLI }}
        run: echo "$IRONBANK_REGISTRY_CLI" | docker login registry1.dso.mil -u jmthomas --password-stdin
      - name: Login to DockerHub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Login to the GitHub Container registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
        with:
          driver: cloud
          endpoint: "openc3inc/github-builder"
          install: true
      - name: Update version to desired
        run: ruby openc3_set_versions.rb
        working-directory: scripts/release
        env:
          OPENC3_RELEASE_VERSION: ${{ github.event.inputs.version }}
      - uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7.1.0
        with:
          commit_message: "[Github Action] Update version to ${{ github.event.inputs.version }}"
          tagging_message: "v${{ github.event.inputs.version }}"
          push_options: --force
      - name: Build Python Package
        working-directory: openc3/python
        run: python -m build
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 10
      - name: Build pnpm Packages
        run: pnpm install --frozen-lockfile --ignore-scripts; pnpm build:common
        working-directory: openc3-cosmos-init/plugins
      - name: build_multi_arch
        # This `shell` line is required to get around a known issue: https://github.com/actions/runner/issues/241#issuecomment-745902718
        shell: 'script -q -e -c "bash {0}"'
        run: ./build_multi_arch.sh
        working-directory: scripts/release
        env:
          OPENC3_DEPENDENCY_REGISTRY: docker.io
          OPENC3_ENTERPRISE_REGISTRY: ghcr.io
          OPENC3_ENTERPRISE_NAMESPACE: openc3
          OPENC3_REGISTRY: docker.io
          OPENC3_NAMESPACE: openc3inc
          OPENC3_RELEASE_VERSION: ${{ github.event.inputs.version }}
          OPENC3_UPDATE_LATEST: ${{ github.event.inputs.update_latest }}
      - name: build_multi_arch UBI
        # This `shell` line is required to get around a known issue: https://github.com/actions/runner/issues/241#issuecomment-745902718
        shell: 'script -q -e -c "bash {0}"'
        run: ./build_multi_arch.sh ubi
        working-directory: scripts/release
        env:
          OPENC3_DEPENDENCY_REGISTRY: docker.io
          OPENC3_ENTERPRISE_REGISTRY: ghcr.io
          OPENC3_ENTERPRISE_NAMESPACE: openc3
          OPENC3_REGISTRY: docker.io
          OPENC3_NAMESPACE: openc3inc
          OPENC3_RELEASE_VERSION: ${{ github.event.inputs.version }}
          OPENC3_UPDATE_LATEST: ${{ github.event.inputs.update_latest }}
      - name: extract gems
        # This `shell` line is required to get around a known issue: https://github.com/actions/runner/issues/241#issuecomment-745902718
        shell: 'script -q -e -c "bash {0}"'
        run: ./extract_gems.sh
        working-directory: scripts/release
        env:
          OPENC3_DEPENDENCY_REGISTRY: docker.io
          OPENC3_ENTERPRISE_REGISTRY: ghcr.io
          OPENC3_ENTERPRISE_NAMESPACE: openc3
          OPENC3_REGISTRY: docker.io
          OPENC3_NAMESPACE: openc3inc
          OPENC3_RELEASE_VERSION: ${{ github.event.inputs.version }}
      - name: publish gems
        continue-on-error: true
        run: ruby publish_gems.rb
        working-directory: scripts/release
        env:
          GEM_HOST_API_KEY: ${{ secrets.GEM_HOST_API_KEY }}
      # Publish python package. We continue on error here because we don't want a failure to block the version update.
      # We're using trusted publishing for the python package which is defined at
      #   https://pypi.org/manage/project/openc3/settings/publishing/
      # This references our Release environment: https://github.com/OpenC3/cosmos/settings/environments
      # If the publish fails for some reason you can manually build and publish by running
      #   cd openc3/python
      #   python3 -m venv venv
      #   source venv/bin/activate
      #   python3 -m pip install build twine
      #   python3 -m build
      #   python3 -m twine upload dist/*
      - name: Publish python package
        continue-on-error: true
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
        with:
          packages-dir: openc3/python/dist
      # Publish npm packages. We continue on error here because we don't want a failure to block the version update.
      # We're using trusted publishing for npm packages which is defined at
      #   https://www.npmjs.com/package/@openc3/js-common/access
      #   https://www.npmjs.com/package/@openc3/vue-common/access
      # Both reference our Release environment: https://github.com/OpenC3/cosmos/settings/environments
      # If the publish fails for some reason you can manually build and publish by running
      #   cd openc3-cosmos-init/plugins/
      #   pnpm install --frozen-lockfile --ignore-scripts
      #   pnpm build:common
      #   npm login
      #   pnpm -F "@openc3/*-common" publish --no-git-checks --access public
      - name: publish common npm packages
        if: ${{ github.event.inputs.update_latest == 'true' }}
        continue-on-error: true
        run: pnpm -F "@openc3/*-common" publish --no-git-checks --access public --provenance
        working-directory: openc3-cosmos-init/plugins
      - name: publish common npm packages pre
        if: ${{ github.event.inputs.update_latest != 'true' }}
        continue-on-error: true
        run: pnpm -F "@openc3/*-common" publish --no-git-checks --tag pre --access public --provenance
        working-directory: openc3-cosmos-init/plugins
      - name: Update version to next
        run: ruby openc3_set_versions.rb
        working-directory: scripts/release
        env:
          OPENC3_RELEASE_VERSION: ${{ github.event.inputs.next_version }}
      - uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7.1.0
        with:
          commit_message: "[Github Action] Update version to ${{ github.event.inputs.next_version }}"
          push_options: --force
