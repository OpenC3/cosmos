# Define root directories for sources and tests
sonar.sources = openc3/lib/,openc3/python/openc3/
sonar.tests = openc3/spec/,openc3/python/test

# Release-time developer scripts run locally on a maintainer's workstation.
# All inputs come from files on disk and the maintainer's own prompts, so
# path traversal / command injection findings from these files are not
# applicable. Exclude them from security hotspot analysis.
sonar.security.exclusions = scripts/release/**/*.rb

# The screen BUTTON widget sandbox (sandbox.html + buttonScriptSandbox.js) is a
# deliberate JavaScript isolation control: it executes author-supplied button
# JavaScript with eval inside an opaque-origin iframe whose CSP is precisely what
# permits that eval. These findings ARE the design and were reviewed as safe -
# the sandboxed frame has no session token, no cookies, no parent DOM, and (via
# default-src 'none') no network egress - so the eval, permissive-CSP, and
# opaque-origin postMessage rules are ignored for these two files only.
sonar.issue.ignore.multicriteria = sandboxEval,sandboxCsp,sandboxPostMessage

# eval of author button code inside the jailed frame (the sandbox's whole purpose)
sonar.issue.ignore.multicriteria.sandboxEval.ruleKey = javascript:S1523
sonar.issue.ignore.multicriteria.sandboxEval.resourceKey = **/openc3-tool-base/public/sandbox.html

# CSP must allow 'unsafe-eval'/'unsafe-inline' *inside* the opaque frame so that
# eval can run; network egress is still fully blocked by default-src 'none'
sonar.issue.ignore.multicriteria.sandboxCsp.ruleKey = Web:S7039
sonar.issue.ignore.multicriteria.sandboxCsp.resourceKey = **/openc3-tool-base/public/sandbox.html

# postMessage to a sandboxed (opaque-origin) frame must use '*' as targetOrigin;
# the message is delivered only to our own contentWindow and never carries the token
sonar.issue.ignore.multicriteria.sandboxPostMessage.ruleKey = javascript:S2819
sonar.issue.ignore.multicriteria.sandboxPostMessage.resourceKey = **/openc3-vue-common/src/util/buttonScriptSandbox.js