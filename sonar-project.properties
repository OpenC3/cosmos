# Define root directories for sources and tests
sonar.sources = openc3/lib/,openc3/python/openc3/
sonar.tests = openc3/spec/,openc3/python/test

# Release-time developer scripts run locally on a maintainer's workstation.
# All inputs come from files on disk and the maintainer's own prompts, so
# path traversal / command injection findings from these files are not
# applicable. Exclude them from security hotspot analysis.
sonar.security.exclusions = scripts/release/**/*.rb